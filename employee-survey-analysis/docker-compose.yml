services:
  postgres:
    image: postgres:16
    container_name: pulsepoint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulsepoint}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pulsepoint_postgres_data:/var/lib/postgresql/data

volumes:
  pulsepoint_postgres_data:
